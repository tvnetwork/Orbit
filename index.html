    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        var originalFetch = window.fetch;
        var currentFetch = originalFetch;
        
        function tryDefine(obj) {
          try {
            Object.defineProperty(obj, 'fetch', {
              get: function() { return currentFetch; },
              set: function(v) { currentFetch = v; },
              configurable: true,
              enumerable: true
            });
            return true;
          } catch (e) {
            return false;
          }
        }

        if (!tryDefine(window)) {
          tryDefine(Object.getPrototypeOf(window));
        }
      })();
    </script>
